      tool_call_accuracy_min: 1.0
      faithfulness_min: 0.8
      relevancy_min: 0.7

  # ── 4. borderline_verifier: Devraj variant ──────────────────────────────
  - id: task_04_borderline_variant
    category: borderline_verifier
