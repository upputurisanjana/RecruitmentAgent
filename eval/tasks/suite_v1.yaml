      - tool_name: score_candidate
        order_index: 1
        required_args:
          candidate: "Rahul"
    expected_decision:
      verdict: "HOLD"
      must_trigger_human_gate: false
      must_trigger_verifier: false
    pass_criteria:
      trace_invariants_required:
        - parse_before_score
