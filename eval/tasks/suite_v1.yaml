      faithfulness_min: 0.6
      relevancy_min: 0.6

  # ── 8. missing_field: malformed résumé ──────────────────────────────────
  - id: task_08_missing_field
    category: missing_field
    description: >
      Malformed text file — corrupted content, no parseable skills/projects.
      Agent must handle parse failure gracefully (not crash).
