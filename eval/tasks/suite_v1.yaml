  # ── 10. conflicting_tools: Rahul under an alternative (lenient) rubric ──
  #   The "conflict" is between the default rubric score and the lenient rubric
  #   score for the same borderline candidate — the agent uses default rubric
  #   (only one rubric is wired in), so result is deterministic.
  #   This tests that the agent doesn't escalate or hallucinate when a
  #   borderline result appears; it should produce HOLD or NOT A FIT.
  - id: task_10_conflicting_tools
    category: conflicting_tools
    description: >
      Rahul's résumé scored under the standard rubric (same as task_03).
      For the "conflict" scenario, this task asserts the agent does NOT
      call check_availability (no INTERVIEW verdict), confirming no
      spurious tool calls on borderline cases.
    input:
      jd_ref: "data/jd.md"
      resume_paths:
        - "data/resumes/rahul.txt"
      rubric_ref: "default"
    expected_trajectory:
      - "thought"
      - "action:parse_resume"
      - "observation"
      - "action:score_candidate"
      - "observation"
      - "decision"
    expected_tool_calls:
      - tool_name: parse_resume
        order_index: 0
        required_args: {}
      - tool_name: score_candidate
        order_index: 1
        required_args: {}
    expected_decision:
      verdict: null   # HOLD or NOT A FIT
      must_trigger_human_gate: false
      must_trigger_verifier: false
    pass_criteria:
      trace_invariants_required:
        - parse_before_score
        - stopping_condition_met
      tool_call_accuracy_min: 1.0
      faithfulness_min: 0.6
      relevancy_min: 0.6
